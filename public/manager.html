<!DOCTYPE html>
<html>
<head>
  <title>Manager Dashboard</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      background: #f5f1e6;
      font-family: "Segoe UI", sans-serif;
    }

    .sidebar {
      background: #556b2f;
      color: white;
      min-height: 100vh;
      padding: 20px;
      box-shadow: 2px 0 10px rgba(0,0,0,0.1);
    }

    .sidebar h4 {
      font-weight: bold;
      letter-spacing: 1px;
    }

    .sidebar button {
      background: #6b8e23;
      border: none;
      margin-bottom: 12px;
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      color: white;
      transition: 0.3s;
    }

    .sidebar button:hover {
      background: #3f4f1f;
      transform: translateX(3px);
    }

    .card {
      border-radius: 14px;
      background: #fffdf7;
      border: 1px solid #e6dfd2;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }

    h2 {
      color: #556b2f;
      font-weight: bold;
      margin-bottom: 20px;
    }

    th {
      background: #556b2f !important;
      color: white;
    }

    table {
      border-radius: 10px;
      overflow: hidden;
    }

    .btn-warning {
      background: #c2a878;
      border: none;
    }

    .btn-danger {
      background: #8b5e3c;
      border: none;
    }

    .btn-primary {
      background: #556b2f;
      border: none;
    }

    input.form-control {
      border-radius: 8px;
    }
  </style>
</head>

<body>

<div class="container-fluid">
  <div class="row">

    <!-- SIDEBAR -->
    <div class="col-md-2 sidebar">
      <h4 class="text-center mb-4">Manager</h4>

      <button onclick="window.location.reload()">🔄 Refresh</button>
      <button onclick="downloadReport()">📄 Download PDF</button>
      <button onclick="logout()">🚪 Logout</button>
    </div>

    <!-- MAIN -->
    <div class="col-md-10 p-4">

      <h2>Product Management</h2>

      <!-- DASHBOARD STATS -->
      <div class="row mb-4">

        <div class="col-md-3">
          <div class="card p-3 text-center">
            <h6>Total Products</h6>
            <h4 id="totalProducts">0</h4>
          </div>
        </div>

        <div class="col-md-3">
          <div class="card p-3 text-center">
            <h6>Total Quantity</h6>
            <h4 id="totalQty">0</h4>
          </div>
        </div>

        <div class="col-md-3">
          <div class="card p-3 text-center">
            <h6>Total Value</h6>
            <h4 id="totalValue">0</h4>
          </div>
        </div>

        <div class="col-md-3">
          <div class="card p-3 text-center">
            <h6>Categories</h6>
            <h4 id="totalCategories">0</h4>
          </div>
        </div>

      </div>

      <!-- CHART -->
      <div class="card p-3 mb-4">
        <h5 class="mb-3">Stock Analytics</h5>
        <canvas id="stockChart" height="100"></canvas>
      </div>

      <!-- ADD PRODUCT (PHASE 5 SECURITY ADDED) -->
      <div class="card p-3 mb-3">
        <div class="row g-2">

          <div class="col-md-2">
            <input class="form-control" id="code" placeholder="Code" maxlength="50">
          </div>

          <div class="col-md-2">
            <input class="form-control" id="name" placeholder="Name" autocomplete="off" maxlength="100">
          </div>

          <div class="col-md-2">
            <input class="form-control" id="category" placeholder="Category" maxlength="50">
          </div>

          <div class="col-md-2">
            <input class="form-control" id="details" placeholder="Details" maxlength="200">
          </div>

          <div class="col-md-1">
            <input class="form-control" id="unit" placeholder="Unit" maxlength="20">
          </div>

          <div class="col-md-1">
            <input class="form-control" id="quantity" placeholder="Qty" type="number" min="0">
          </div>

          <div class="col-md-1">
            <input class="form-control" id="price" placeholder="Price" type="number" min="0">
          </div>

          <div class="col-md-1">
            <button class="btn btn-primary w-100" onclick="addProduct()">Save</button>
          </div>

        </div>
      </div>

      <!-- SEARCH -->
      <input class="form-control mb-3" id="search" placeholder="🔍 Search products...">

      <div id="table"></div>
      <h5 id="total" class="mt-3"></h5>

    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
