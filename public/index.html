<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #f5f1e6, #d8cfc4);
      font-family: Arial;
    }

    .login-card {
      width: 360px;
      background: #fffdf7;
      border-radius: 14px;
      padding: 25px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      border: 1px solid #e6dfd2;
    }

    h3 {
      color: #556b2f;
      font-weight: bold;
    }

    .btn-login {
      background: #556b2f;
      border: none;
    }

    .btn-login:hover {
      background: #3f4f1f;
    }

    .loading {
      opacity: 0.7;
      pointer-events: none;
    }
  </style>
</head>

<body class="d-flex justify-content-center align-items-center" style="height:100vh">

<div class="login-card">

  <h3 class="text-center mb-3">Stock System</h3>

  <!-- FIXED: autocomplete + required (Phase 6 frontend stability) -->
  <input class="form-control mb-2"
         id="username"
         placeholder="Username"
         autocomplete="username"
         required>

  <input class="form-control mb-3"
         type="password"
         id="password"
         placeholder="Password"
         autocomplete="current-password"
         required>

  <button id="loginBtn"
          class="btn btn-login w-100 text-white"
          onclick="login()">
    Login
  </button>

  <p id="msg" class="text-danger mt-2 text-center"></p>

</div>

<script src="app.js"></script>

<!-- PHASE 6 FRONTEND ENHANCEMENT SCRIPT -->
<script>
 document.getElementById("loginBtn").addEventListener("click", login)
</script>

</body>
</html>
