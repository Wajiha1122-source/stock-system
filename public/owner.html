<!DOCTYPE html>
<html>
<head>
  <title>Owner Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      background: #f5f1e6;
    }

    .sidebar {
      background: #3f4f1f;
      color: white;
      min-height: 100vh;
      padding: 20px;
    }

    .sidebar button {
      background: #556b2f;
      border: none;
      margin-bottom: 10px;
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      color: white;
    }

    .sidebar button:hover {
      background: #2f3a15;
    }

    h2 {
      color: #556b2f;
    }

    table {
      background: white;
    }

    th {
      background: #556b2f !important;
      color: white;
    }

    .low-stock {
      background: #fff3cd;
      border-left: 5px solid #ff9800;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 6px;
    }

    .urgent-stock {
      background: #f8d7da;
      border-left: 5px solid #dc3545;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<div class="container-fluid">
  <div class="row">

    <div class="col-md-2 sidebar">
      <h4 class="text-center">Owner</h4>
      <button onclick="downloadReport()">Download PDF</button>
      <button onclick="logout()">Logout</button>
    </div>

    <div class="col-md-10 p-4">

      <h2>Stock Overview</h2>

      <!-- LOW STOCK WARNING PANEL -->
      <div id="lowStockBox"></div>

      <!-- CHART -->
      <div class="card p-3 mb-3">
        <h5>Stock Analytics</h5>
        <canvas id="stockChart" height="100"></canvas>
      </div>

      <div id="table"></div>
      <h5 id="total" class="mt-3"></h5>

    </div>

  </div>
</div>

<script src="app.js"></script>
</body>
</html>
